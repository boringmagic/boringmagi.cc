---
layout: default
---

<section class="posts">
<h1>Tag #{{page.tag}}</h1>
    <ul>
      {% for document in page.documents %}
      <li>
        <a class="post" href="{{ document.url }}">{{ document.title }}</a>
        {% if document.date %}
        <time datetime="{{ document.date | date_to_xmlschema }}">{{ document.date | date: "%d-%m-%Y" }}</time>
        {% endif %}
      </li>
      {% else %}
      <li>No content found for this tag yet.</li>
      {% endfor %}
    </ul>
	
</section>
